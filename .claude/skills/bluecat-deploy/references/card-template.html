<!-- ============================================================
  门户卡片模板（bluecatbot.com / website-main/index.html）
  用法：把【卡片块】粘到 index.html 的 .grid 末尾（最后一张卡片 </a> 之后、</div> 之前）；
       把【i18n 三行】分别加到 <script> 里 i18n 的 zh / en / ja 三个字典中。
  占位符：<sub> 子域名前缀 · <Name> 卡片标题 · <key> i18n键(小写无空格) · <TAG> 标签 · <ICON> HTML实体码
  可用 <TAG>：tool ai trade data app video admin game   （对应 .tag-* 颜色）
  常用 <ICON>：🔍&#128269; 🛠&#128296; 📊&#128202; 🤖&#129302; 📥&#11015; 📚&#128218; 🔒&#128274; ✍&#9997;
  注意：只动 .grid 与 i18n，不要碰 <head>（门户 SEO 已完整）。
  校验：grep -c "<key>" index.html 应 = 4（卡片 data-i18n + 三语）。
============================================================ -->

<!-- ① 卡片块（加到 .grid 末尾） -->
  <a class="card" href="https://<sub>.bluecatbot.com" target="_blank">
    <span class="card-tag tag-<TAG>" data-i18n-tag="<TAG>">工具</span>
    <span class="card-icon">&#<ICON>;</span>
    <div class="card-title"><Name></div>
    <div class="card-desc" data-i18n="<key>"><中文一句话描述（与下面 zh 值一致）></div>
    <div class="card-url"><sub>.bluecatbot.com</div>
  </a>

<!-- ② i18n：在 zh 字典加 -->
    <key>: '<中文一句话描述>',
<!-- ②' 在 en 字典加 -->
    <key>: '<English one-line description>',
<!-- ②'' 在 ja 字典加 -->
    <key>: '<日本語の一文説明>',
